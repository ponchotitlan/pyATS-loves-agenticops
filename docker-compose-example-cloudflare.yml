services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Timezone
      - TZ=Europe/Lisbon
      - GENERIC_TIMEZONE=Europe/Lisbon
      - N8N_USER_MANAGEMENT_DISABLED=true
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      # Cloudflare Tunnel - Set your public domain (e.g., n8n.yourdomain.com)
      - WEBHOOK_URL=https://YOUR_DOMAIN
      - N8N_HOST=YOUR_DOMAIN
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - N8N_EDITOR_BASE_URL=https://YOUR_DOMAIN
      - N8N_PROXY_HOPS=1

    volumes:
      - n8n_data:/home/node/.n8n
      
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    entrypoint: ["sh", "-c", "sleep 20 && n8n start"]
    networks:
      - internal

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      # Get your tunnel token from https://dash.cloudflare.com/zero-trust/networks/tunnels
      - TUNNEL_TOKEN=YOUR_TUNNEL_TOKEN
    depends_on:
      - n8n
    networks:
      - internal

  pyats-mcp:
    build:
      context: https://github.com/ponchotitlan/pyATS_MCP.git
      dockerfile: Dockerfile
    image: pyats-mcp:latest
    container_name: pyats-mcp
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    volumes:
      - ./testbed.yaml:/app/testbed.yaml:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - internal

volumes:
  n8n_data:
    driver: local

networks:
  internal:
    driver: bridge